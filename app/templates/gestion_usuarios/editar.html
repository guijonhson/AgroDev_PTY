{% extends "base.html" %}
{% block title %}Editar Usuario - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-person-edit"></i> Editar Usuario</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Productor</label>
                <select name="id_productor" class="form-select" required {% if current_user.rol != 'administrador' %}disabled{% endif %}>
                    {% for productor in productores %}
                    <option value="{{ productor.id }}" {% if usuario.id_productor == productor.id %}selected{% endif %}>
                        {{ productor.nombre }}
                    </option>
                    {% endfor %}
                </select>
                {% if current_user.rol != 'administrador' %}<input type="hidden" name="id_productor" value="{{ usuario.id_productor }}">{% endif %}
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre de Usuario</label>
                <input type="text" name="nombre_usuario" class="form-control" value="{{ usuario.nombre_usuario }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" name="correo" class="form-control" value="{{ usuario.correo }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nueva Contraseña (dejar en blanco para mantener)</label>
                <input type="password" name="password" class="form-control">
            </div>
            {% if current_user.rol == 'administrador' %}
            <div class="mb-3">
                <label class="form-label">Rol</label>
                <select name="rol" class="form-select" required>
                    <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                    <option value="administrador" {% if usuario.rol == 'administrador' %}selected{% endif %}>Administrador</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="activo" class="form-select" required>
                    <option value="1" {% if usuario.activo %}selected{% endif %}>Activo</option>
                    <option value="0" {% if not usuario.activo %}selected{% endif %}>Inactivo</option>
                </select>
            </div>
            {% endif %}
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Guardar Cambios</button>
                <a href="{{ url_for('gestion_usuarios.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
