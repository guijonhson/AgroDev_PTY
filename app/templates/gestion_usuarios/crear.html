{% extends "base.html" %}
{% block title %}Nuevo Usuario - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-person-plus"></i> Nuevo Usuario</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Productor</label>
                <select name="id_productor" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for productor in productores %}
                    <option value="{{ productor.id }}">{{ productor.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Nombre de Usuario</label>
                <input type="text" name="nombre_usuario" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" name="correo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Rol</label>
                <select name="rol" class="form-select" required>
                    <option value="cliente">Cliente</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Crear Usuario</button>
                <a href="{{ url_for('gestion_usuarios.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
