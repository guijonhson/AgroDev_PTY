{% extends "base.html" %}
{% block title %}Nuevo Cultivo - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-flower2"></i> Nuevo Cultivo</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre del Cultivo</label>
                <input type="text" name="nombre_cultivo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ciclo Aproximado (días)</label>
                <input type="number" name="ciclo_dias_aprox" class="form-control">
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Guardar</button>
                <a href="{{ url_for('cultivos.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
