{% extends "base.html" %}
{% block title %}Editar Inventario - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-box-seam"></i> Editar Inventario</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Producto</label>
                    <select name="id_producto" class="form-select" required>
                        {% for producto in productos %}
                        <option value="{{ producto.id }}" {% if inventario.id_producto == producto.id %}selected{% endif %}>
                            {{ producto.nombre_producto }} ({{ producto.tipo_producto }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Finca</label>
                    <select name="id_finca" class="form-select" required>
                        {% for financa in fincas %}
                        <option value="{{ financa.id }}" {% if inventario.id_finca == financa.id %}selected{% endif %}>
                            {{ financa.nombre_finca }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="cantidad" class="form-control" value="{{ inventario.cantidad }}" required>
                </div>
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Unidad de Medida</label>
                    <select name="unidad_medida" class="form-select">
                        <option value="kg" {% if inventario.unidad_medida == 'kg' %}selected{% endif %}>Kilogramos (kg)</option>
                        <option value="litros" {% if inventario.unidad_medida == 'litros' %}selected{% endif %}>Litros (L)</option>
                        <option value="unidades" {% if inventario.unidad_medida == 'unidades' %}selected{% endif %}>Unidades</option>
                        <option value="sacos" {% if inventario.unidad_medida == 'sacos' %}selected{% endif %}>Sacos</option>
                        <option value="galones" {% if inventario.unidad_medida == 'galones' %}selected{% endif %}>Galones</option>
                    </select>
                </div>
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Stock Mínimo (alerta)</label>
                    <input type="number" step="0.01" name="stock_minimo" class="form-control" value="{{ inventario.stock_minimo }}">
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Proveedor</label>
                    <input type="text" name="proveedor" class="form-control" value="{{ inventario.proveedor or '' }}">
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Costo Unitario ($)</label>
                    <input type="number" step="0.01" name="costo_unitario" class="form-control" value="{{ inventario.costo_unitario }}">
                </div>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Guardar Cambios</button>
                <a href="{{ url_for('inventario.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
