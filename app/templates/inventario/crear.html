{% extends "base.html" %}
{% block title %}Nuevo Producto Inventario - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-box-seam"></i> Agregar al Inventario</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Producto</label>
                    <select name="id_producto" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for producto in productos %}
                        <option value="{{ producto.id }}">{{ producto.nombre_producto }} ({{ producto.tipo_producto }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Finca</label>
                    <select name="id_finca" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for financa in fincas %}
                        <option value="{{ financa.id }}">{{ financa.nombre_finca }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="cantidad" class="form-control" required>
                </div>
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Unidad de Medida</label>
                    <select name="unidad_medida" class="form-select">
                        <option value="kg">Kilogramos (kg)</option>
                        <option value="litros">Litros (L)</option>
                        <option value="unidades">Unidades</option>
                        <option value="sacos">Sacos</option>
                        <option value="galones">Galones</option>
                    </select>
                </div>
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Stock Mínimo (alerta)</label>
                    <input type="number" step="0.01" name="stock_minimo" class="form-control" value="0">
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Fecha de Ingreso</label>
                    <input type="date" name="fecha_ingreso" class="form-control">
                </div>
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Proveedor</label>
                    <input type="text" name="proveedor" class="form-control">
                </div>
                <div class="col-12 col-sm-4 mb-3">
                    <label class="form-label">Costo Unitario ($)</label>
                    <input type="number" step="0.01" name="costo_unitario" class="form-control">
                </div>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Agregar al Inventario</button>
                <a href="{{ url_for('inventario.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
