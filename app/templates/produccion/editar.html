{% extends "base.html" %}
{% block title %}Editar Cosecha - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-pencil"></i> Editar Cosecha</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Cultivo</label>
                    <select name="id_cultivo" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for cultivo in cultivos %}
                        <option value="{{ cultivo.id }}" {% if produccion.id_cultivo == cultivo.id %}selected{% endif %}>{{ cultivo.nombre_cultivo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Parcela</label>
                    <select name="id_parcela" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for parcela in parcelas %}
                        <option value="{{ parcela.id }}" {% if produccion.id_parcela == parcela.id %}selected{% endif %}>{{ parcela.numero_parcela }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Fecha de Cosecha</label>
                    <input type="date" name="fecha_cosecha" class="form-control" value="{{ produccion.fecha_cosecha }}" required>
                </div>
                <div class="col-6 col-sm-3 mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="cantidad" class="form-control" value="{{ produccion.cantidad }}" required>
                </div>
                <div class="col-6 col-sm-3 mb-3">
                    <label class="form-label">Unidad</label>
                    <select name="unidad_medida" class="form-select">
                        <option value="kg" {% if produccion.unidad_medida == 'kg' %}selected{% endif %}>Kilogramos (kg)</option>
                        <option value="ton" {% if produccion.unidad_medida == 'ton' %}selected{% endif %}>Toneladas (ton)</option>
                        <option value="qq" {% if produccion.unidad_medida == 'qq' %}selected{% endif %}>Quintales (qq)</option>
                        <option value="unidades" {% if produccion.unidad_medida == 'unidades' %}selected{% endif %}>Unidades</option>
                        <option value="lbs" {% if produccion.unidad_medida == 'lbs' %}selected{% endif %}>Libras (lbs)</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Precio de Venta (por unidad)</label>
                    <input type="number" step="0.01" name="precio_venta" class="form-control" value="{{ produccion.precio_venta }}">
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Ingreso Total</label>
                    <input type="text" class="form-control" value="${{ "%.2f"|format(produccion.ingreso_total) }}" readonly>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <textarea name="observaciones" class="form-control" rows="3">{{ produccion.observaciones or '' }}</textarea>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-primary w-100 w-md-auto">Guardar Cambios</button>
                <a href="{{ url_for('produccion.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
