{% extends "base.html" %}
{% block title %}Nuevo Producto - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-droplet"></i> Nuevo Producto</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre del Producto</label>
                <input type="text" name="nombre_producto" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo de Producto</label>
                <select name="tipo_producto" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    <option value="herbicida">Herbicida</option>
                    <option value="fungicida">Fungicida</option>
                    <option value="insecticida">Insecticida</option>
                    <option value="fertilizante">Fertilizante</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Guardar</button>
                <a href="{{ url_for('productos.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
