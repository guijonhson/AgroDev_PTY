{% extends "base.html" %}
{% block title %}Ver Finca - AgroDev{% endblock %}
{% block content %}
<h3><i class="bi bi-building"></i> {{ finca.nombre_finca }}</h3>
<div class="card mt-3">
    <div class="card-body">
        <p><strong>Ubicación:</strong> {{finca.ubicacion or '-' }}</p>
        <p><strong>Área Total:</strong> {{finca.area_total or '-' }} hectáreas</p>
        <p><strong>Parcelas:</strong> {{finca.parcelas|length }}</p>
        <a href="{{ url_for('fincas.listar') }}" class="btn btn-secondary">Volver</a>
    </div>
</div>
{% endblock %}
