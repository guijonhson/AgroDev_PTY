{% extends "base.html" %}
{% block title %}Nueva Finca - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-building"></i> Nueva Finca</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre de la Finca</label>
                <input type="text" name="nombre_finca" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ubicación</label>
                <input type="text" name="ubicacion" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Área Total (hectáreas)</label>
                <input type="number" step="0.01" name="area_total" class="form-control">
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Guardar</button>
                <a href="{{ url_for('fincas.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
