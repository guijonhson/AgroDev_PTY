{% extends "base.html" %}
{% block title %}Nuevo Gasto - AgroDev{% endblock %}
{% block content %}
<h3 class="h4 h3-md"><i class="bi bi-cash-stack"></i> Registrar Gasto</h3>
<div class="card mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Tipo de Gasto</label>
                    <select name="tipo_gasto" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for key, label in categorias.items() %}
                        <option value="{{ key }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Monto ($)</label>
                    <input type="number" step="0.01" name="monto" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <input type="text" name="descripcion" class="form-control">
            </div>
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" name="fecha" class="form-control" required>
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Responsable</label>
                    <input type="text" name="responsable" class="form-control">
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Finca</label>
                    <select name="id_finca" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for financa in fincas %}
                        <option value="{{ financa.id }}">{{ financa.nombre_finca }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6 mb-3">
                    <label class="form-label">Cultivo (opcional)</label>
                    <select name="id_cultivo" class="form-select">
                        <option value="">Seleccionar...</option>
                        {% for cultivo in cultivos %}
                        <option value="{{ cultivo.id }}">{{ cultivo.nombre_cultivo }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success w-100 w-md-auto">Registrar Gasto</button>
                <a href="{{ url_for('gastos.listar') }}" class="btn btn-secondary w-100 w-md-auto">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
